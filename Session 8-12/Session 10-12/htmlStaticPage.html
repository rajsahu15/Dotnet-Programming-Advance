
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raj Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Raj - Web Developer Portfolio">
    
    <link rel="stylesheet" href="css/style3.css">
</head>

<body>

<header>
    <h1>Raj Sahu</h1>
    <p>Web Developer | HTML5 Enthusiast</p>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#media">Media</a>
    <a href="#contact">Contact</a>
</nav>

<main>

<section id="about">
    <h2>About Me</h2>
    <p>
        I am passionate about building modern web applications using clean HTML5 structure 
        and best practices.
    </p>

    <figure>
        <img src="https://via.placeholder.com/300" alt="Raj profile picture">
        <figcaption>My Profile Image</figcaption>
    </figure>
</section>

<section id="projects">
    <h2>Projects</h2>

    <article>
        <h3>Canvas Demo</h3>
        <canvas id="myCanvas" width="300" height="150"></canvas>
    </article>

    <article>
        <h3>SVG Logo</h3>
        <svg width="150" height="150">
            <circle cx="75" cy="75" r="60" fill="blue"></circle>
        </svg>
    </article>
</section>

<section id="media">
    <h2>Multimedia</h2>

    <video width="400" controls>
        <source src="sample.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
</section>

<section id="contact">
    <h2>Contact Me</h2>

    <form>
        <label for="email">Email:</label><br>
        <input type="email" id="email" required><br>

        <label for="message">Message:</label><br>
        <input type="text" id="message" required><br>

        <button type="submit">Send</button>
    </form>
</section>

</main>

<footer>
    <p>© 2026 Raj Sahu | All Rights Reserved</p>
</footer>

<script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "green";
    ctx.fillRect(50, 40, 200, 60);
</script>

</body>
</html>
