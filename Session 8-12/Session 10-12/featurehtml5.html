<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic Layout</title>
</head>
<body>

<header>
  <h1>Raj Tech Blog</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
</nav>

<main>
  <section>
    <article>
      <h2>HTML5 Introduction</h2>
      <p>This is article content.</p>
    </article>
  </section>

  <aside>
    <p>Related Posts</p>
  </aside>
</main>
<audio controls>
  <source src="audio.mp3" type="audio/mpeg">
  Your browser does not support audio.
</audio>

<video width="400" controls>
  <source src="video.mp4" type="video/mp4">
  Your browser does not support video.
</video>

<form>
  Email: <input type="email" required><br><br>
  Date: <input type="date"><br><br>
  Number: <input type="number" min="1" max="10"><br><br>
  Color: <input type="color"><br><br>
  <button>Submit</button>
</form>

<footer>
  <p>© 2026 Raj</p>
</footer>

</body>
</html>
