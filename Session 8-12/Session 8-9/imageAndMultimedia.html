<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial for Beginners  </title>
</head>
<body>

    <h2>Image Example Using URL:</h2>

    <img 
    src="https://disney.images.edge.bamgrid.com/ripcut-delivery/v2/variant/disney/1a27be0e-b58c-4572-84e1-1e2615b39919/compose?format=webp&width=2560"
    alt="Image Not Found" 
    width="300"
    height="200">
    
    <h2>Image Example Using local Dir</h2>

    <img 
    src="WEB/car.jpg"
    alt="Image Not Found" 
    width="300"
    height="200"
    loading="lazy">

    <h2>Audio Example</h2>

    <audio controls>
    <source src="WEB/rain.mp3" type="audio/mpeg">
    Your browser does not support audio.
    </audio>
    <h2>Video Example</h2>

<video controls width="400" autoplay muted loop>
    <source src="WEB/carvi.mp4" type="video/mp4">
    Your browser does not support video.
</video>

<h2>Video Example with Youtube</h2>

<iframe width="560" height="315" src="https://www.youtube.com/embed/QU32Wpk8v3w?si=61a93-gzBEudQCwR" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
