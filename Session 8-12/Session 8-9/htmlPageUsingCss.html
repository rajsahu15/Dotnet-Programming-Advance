<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS OUTLOOK</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style2.css">
</head>

<body>

    <div class="container">

        <h1>HTML5 Multimedia Showcase</h1>

        <div class="card">
            <h2>Image Example Using URL</h2>
            <img 
            src="https://disney.images.edge.bamgrid.com/ripcut-delivery/v2/variant/disney/1a27be0e-b58c-4572-84e1-1e2615b39919/compose?format=webp&width=2560"
            alt="Image Not Found">
        </div>

        <div class="card">
            <h2>Image Example Using Local Directory</h2>
            <img 
            src="WEB/car.jpg"
            alt="Image Not Found"
            loading="lazy">
        </div>

        <div class="card">
            <h2>Audio Example</h2>
            <audio controls>
                <source src="WEB/rain.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </div>

        <div class="card">
            <h2>Video Example</h2>
            <video controls autoplay muted loop>
                <source src="WEB/carvi.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </div>

        <div class="card">
            <h2>YouTube Video Example</h2>
            <iframe src="https://www.youtube.com/embed/QU32Wpk8v3w"
                allowfullscreen>
            </iframe>
        </div>

    </div>

</body>
</html>
