<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start CSS</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style1.css">

    <!-- Internal CSS -->
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        h1 {
            color: darkblue;
            font-size: 35px;
            text-transform: uppercase;
            margin-top: 30px;
        }

        .heading {
            border-bottom: 3px solid darkblue;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h2 style="color: red; font-size:28px; text-decoration:underline;">
        Hello World INLINE CSS
    </h2>

    <h1 class="heading">
        Hello World INTERNAL CSS
    </h1>

    <p id="heading2">
        Hello World External CSS <br><br>

        Lorem ipsum dolor sit amet consectetur adipisicing elit.
        Repudiandae ex eligendi, quae dolorem minus magnam nemo laudantium.
        Eveniet exercitationem omnis voluptate repudiandae fuga sint quibusdam natus.
    </p>

</body>
</html>
